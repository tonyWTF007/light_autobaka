<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    
    <style>
        table, th, td {
            border: 1px solid black;
        }

        th, td {
            padding: 2px 5px;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <th>Subject</th>
            <th>Average</th>
        </tr>
        {% for subject, average in data.items() %}
        <tr>
            <td>{{ subject }}</td>
            <td>{{ average }}</td>
        </tr>
        {% endfor %}
    </table>

    <p>Last updated: {{ last_update }}</p>
</body>
</html>
